name: Auto Create Android Structure and Build AAR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ১ নম্বর জব: FFmpeg এর .so ফাইল বিল্ড করা
  build-so-libs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [arm64-v8a, armeabi-v7a]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential yasm nasm cmake git make

    - name: Download FFmpeg Source
      run: |
        git clone --depth 1 --branch release/6.0 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

    - name: Build Audio-Only FFmpeg so
      run: |
        cd ffmpeg-src
        NDK_PATH=$ANDROID_NDK_HOME
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        API=21
        
        if [ "${{ matrix.architecture }}" = "arm64-v8a" ]; then
          ARCH="aarch64"
          CPU="armv8-a"
          CROSS_PREFIX="$TOOLCHAIN/bin/aarch64-linux-android-"
          CC="$TOOLCHAIN/bin/aarch64-linux-android$API-clang"
          CXX="$TOOLCHAIN/bin/aarch64-linux-android$API-clang++"
        else
          ARCH="arm"
          CPU="armv7-a"
          CROSS_PREFIX="$TOOLCHAIN/bin/arm-linux-androideabi-"
          CC="$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang"
          CXX="$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang++"
        fi

        export LDFLAGS="-Wl,-z,max-page-size=16384"

        ./configure \
          --cross-prefix=$CROSS_PREFIX \
          --sysroot=$TOOLCHAIN/sysroot \
          --target-os=android \
          --arch=$ARCH \
          --cpu=$CPU \
          --enable-cross-compile \
          --enable-shared \
          --disable-static \
          --disable-doc \
          --disable-ffmpeg \
          --disable-ffplay \
          --disable-ffprobe \
          --disable-avdevice \
          --disable-swscale \
          --disable-postproc \
          --disable-avfilter \
          --disable-everything \
          --disable-vulkan \
          --disable-hwaccels \
          --disable-vdpau \
          --enable-avcodec \
          --enable-avformat \
          --enable-swresample \
          --enable-decoder=aac,mp3,flac,wav,opus \
          --enable-encoder=aac,mp3,flac,wav,opus \
          --enable-parser=aac,mpegaudio,opus \
          --enable-demuxer=aac,mp3,flac,wav,ogg,mov \
          --enable-muxer=adts,mp3,flac,wav,ogg,mp4 \
          --enable-protocol=file,http,https,tcp,udp \
          --cc=$CC \
          --cxx=$CXX \
          --enable-neon \
          --extra-ldflags="$LDFLAGS"

        make -j4
        
        mkdir -p ../output/${{ matrix.architecture }}
        cp libavcodec/libavcodec.so ../output/${{ matrix.architecture }}/
        cp libavformat/libavformat.so ../output/${{ matrix.architecture }}/
        cp libswresample/libswresample.so ../output/${{ matrix.architecture }}/
        cp libavutil/libavutil.so ../output/${{ matrix.architecture }}/

    - name: Upload Temporary SO Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: so-libs-${{ matrix.architecture }}
        path: output/${{ matrix.architecture }}/

  # ২ নম্বর জব: অটোমেটিক অ্যান্ড্রয়েড প্রজেক্ট তৈরি করে .aar বানানো
  build-aar:
    runs-on: ubuntu-latest
    needs: build-so-libs

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # স্ক্রিপ্টের মাধ্যমে একটি মিনিমাল অ্যান্ড্রয়েড লাইব্রেরি প্রজেক্টের সব ফাইল জেনারেট করা
    - name: Generate Android Library Project Structure
      run: |
        mkdir -p ffmpeg-library/src/main/res
        mkdir -p ffmpeg-library/src/main/jniLibs/arm64-v8a
        mkdir -p ffmpeg-library/src/main/jniLibs/armeabi-v7a
        
        # ১. settings.gradle তৈরি
        echo "include ':ffmpeg-library'" > settings.gradle
        
        # ২. Root build.gradle তৈরি
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google() \n mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
        }
        allprojects {
            repositories { google() \n mavenCentral() }
        }
        EOF

        # ৩. Library build.gradle তৈরি
        cat << 'EOF' > ffmpeg-library/build.gradle
        plugins {
            id 'com.android.library'
        }
        android {
            namespace 'com.tonmoy.ffmpeg.audio'
            compileSdk 34
            defaultConfig {
                minSdk 21
            }
        }
        EOF

        # ৪. AndroidManifest.xml তৈরি
        cat << 'EOF' > ffmpeg-library/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.tonmoy.ffmpeg.audio">
        </manifest>
        EOF

    # তৈরি হওয়া স্ট্রাকচারের ভেতর ডাউনলোড করা .so ফাইলগুলো সেট করা
    - name: Download arm64-v8a SO
      uses: actions/download-artifact@v4
      with:
        name: so-libs-arm64-v8a
        path: ffmpeg-library/src/main/jniLibs/arm64-v8a

    - name: Download armeabi-v7a SO
      uses: actions/download-artifact@v4
      with:
        name: so-libs-armeabi-v7a
        path: ffmpeg-library/src/main/jniLibs/armeabi-v7a

    # Gradle Wrapper ইনস্টল ও রান করা (যেহেতু আমাদের রেপোতে gradlew ফাইল নেই)
    - name: Setup Gradle Wrapper and Build AAR
      run: |
        gradle wrapper --gradle-version 8.0
        chmod +x gradlew
        ./gradlew :ffmpeg-library:assembleRelease

    # ফাইনাল সচল .aar ফাইলটি আপলোড করা
    - name: Upload Final AAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-audio-release-aar
        path: ffmpeg-library/build/outputs/aar/*-release.aar
