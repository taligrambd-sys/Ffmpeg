name: Build Standard Android AAR Library

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-so-libs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [arm64-v8a, armeabi-v7a]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential yasm nasm cmake git make

    - name: Download FFmpeg Source
      run: |
        git clone --depth 1 --branch release/6.0 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

    - name: Build Audio-Only FFmpeg so
      run: |
        cd ffmpeg-src
        NDK_PATH=$ANDROID_NDK_HOME
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        API=21
        
        if [ "${{ matrix.architecture }}" = "arm64-v8a" ]; then
          ARCH="aarch64"
          CPU="armv8-a"
          CROSS_PREFIX="$TOOLCHAIN/bin/aarch64-linux-android-"
          CC="$TOOLCHAIN/bin/aarch64-linux-android$API-clang"
          CXX="$TOOLCHAIN/bin/aarch64-linux-android$API-clang++"
        else
          ARCH="arm"
          CPU="armv7-a"
          CROSS_PREFIX="$TOOLCHAIN/bin/arm-linux-androideabi-"
          CC="$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang"
          CXX="$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang++"
        fi

        export LDFLAGS="-Wl,-z,max-page-size=16384"

        ./configure \
          --cross-prefix=$CROSS_PREFIX \
          --sysroot=$TOOLCHAIN/sysroot \
          --target-os=android \
          --arch=$ARCH \
          --cpu=$CPU \
          --enable-cross-compile \
          --enable-shared \
          --disable-static \
          --disable-doc \
          --disable-ffmpeg \
          --disable-ffplay \
          --disable-ffprobe \
          --disable-avdevice \
          --disable-swscale \
          --disable-postproc \
          --disable-avfilter \
          --disable-everything \
          --disable-vulkan \
          --disable-hwaccels \
          --disable-vdpau \
          --enable-avcodec \
          --enable-avformat \
          --enable-swresample \
          --enable-decoder=aac,mp3,flac,wav,opus \
          --enable-encoder=aac,mp3,flac,wav,opus \
          --enable-parser=aac,mpegaudio,opus \
          --enable-demuxer=aac,mp3,flac,wav,ogg,mov \
          --enable-muxer=adts,mp3,flac,wav,ogg,mp4 \
          --enable-protocol=file,http,https,tcp,udp \
          --cc=$CC \
          --cxx=$CXX \
          --enable-neon \
          --extra-ldflags="$LDFLAGS"

        make -j4
        
        mkdir -p ../output/${{ matrix.architecture }}
        cp libavcodec/libavcodec.so ../output/${{ matrix.architecture }}/
        cp libavformat/libavformat.so ../output/${{ matrix.architecture }}/
        cp libswresample/libswresample.so ../output/${{ matrix.architecture }}/
        cp libavutil/libavutil.so ../output/${{ matrix.architecture }}/

    - name: Upload Temporary SO Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: so-libs-${{ matrix.architecture }}
        path: output/${{ matrix.architecture }}/

  build-aar:
    runs-on: ubuntu-latest
    needs: build-so-libs

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Android Library Project Structure
      run: |
        mkdir -p ffmpeg-library/src/main/java/com/tonmoy/ffmpeg/audio
        mkdir -p ffmpeg-library/src/main/res
        mkdir -p ffmpeg-library/src/main/jniLibs/arm64-v8a
        mkdir -p ffmpeg-library/src/main/jniLibs/armeabi-v7a
        
        # settings.gradle তৈরি
        echo "include ':ffmpeg-library'" > settings.gradle
        
        # Root build.gradle তৈরি
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        # Library build.gradle তৈরি
        cat << 'EOF' > ffmpeg-library/build.gradle
        plugins { id 'com.android.library' }
        android {
            namespace 'com.tonmoy.ffmpeg.audio'
            compileSdk 34
            defaultConfig { minSdk 21 }
        }
        EOF

        # AndroidManifest.xml তৈরি
        cat << 'EOF' > ffmpeg-library/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.tonmoy.ffmpeg.audio"></manifest>
        EOF

        # একটি ডামি জাভা ক্লাস তৈরি করা (যাতে classes.jar তৈরি হতে পারে)
        cat << 'EOF' > ffmpeg-library/src/main/java/com/tonmoy/ffmpeg/audio/FFmpegAudio.java
        package com.tonmoy.ffmpeg.audio;
        public class FFmpegAudio {
            static {
                System.loadLibrary("avutil");
                System.loadLibrary("swresample");
                System.loadLibrary("avcodec");
                System.loadLibrary("avformat");
            }
            public static String getInfo() { return "FFmpeg Audio Loaded Successfully"; }
        }
        EOF

    - name: Download arm64-v8a SO
      uses: actions/download-artifact@v4
      with:
        name: so-libs-arm64-v8a
        path: ffmpeg-library/src/main/jniLibs/arm64-v8a

    - name: Download armeabi-v7a SO
      uses: actions/download-artifact@v4
      with:
        name: so-libs-armeabi-v7a
        path: ffmpeg-library/src/main/jniLibs/armeabi-v7a

    # Gradle ভার্সন লক করে বিল্ড করা (যাতে ৯.৬ ভার্সন ইন্টারফেয়ার না করতে পারে)
    - name: Force Specific Gradle Version and Build AAR
      run: |
        mkdir -p gradle/wrapper
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        # রানারকে নিজস্ব গ্র্যাডল না ব্যবহার করে আমাদের ওয়ালেট ব্যবহার করতে বাধ্য করা
        gradle wrapper
        chmod +x gradlew
        ./gradlew :ffmpeg-library:assembleRelease

    - name: Upload Real Standard AAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-audio-standard-aar
        path: ffmpeg-library/build/outputs/aar/*-release.aar
