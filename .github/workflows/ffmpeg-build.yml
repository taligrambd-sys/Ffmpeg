name: Auto Create Android Structure and Zip for Sketchware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-so-libs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [arm64-v8a, armeabi-v7a]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential yasm nasm cmake git make zip

    - name: Download FFmpeg Source
      run: |
        git clone --depth 1 --branch release/6.0 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

    - name: Build Audio-Only FFmpeg so
      run: |
        cd ffmpeg-src
        NDK_PATH=$ANDROID_NDK_HOME
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        API=21
        
        if [ "${{ matrix.architecture }}" = "arm64-v8a" ]; then
          ARCH="aarch64"
          CPU="armv8-a"
          CROSS_PREFIX="$TOOLCHAIN/bin/aarch64-linux-android-"
          CC="$TOOLCHAIN/bin/aarch64-linux-android$API-clang"
          CXX="$TOOLCHAIN/bin/aarch64-linux-android$API-clang++"
        else
          ARCH="arm"
          CPU="armv7-a"
          CROSS_PREFIX="$TOOLCHAIN/bin/arm-linux-androideabi-"
          CC="$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang"
          CXX="$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang++"
        fi

        export LDFLAGS="-Wl,-z,max-page-size=16384"

        ./configure \
          --cross-prefix=$CROSS_PREFIX \
          --sysroot=$TOOLCHAIN/sysroot \
          --target-os=android \
          --arch=$ARCH \
          --cpu=$CPU \
          --enable-cross-compile \
          --enable-shared \
          --disable-static \
          --disable-doc \
          --disable-ffmpeg \
          --disable-ffplay \
          --disable-ffprobe \
          --disable-avdevice \
          --disable-swscale \
          --disable-postproc \
          --disable-avfilter \
          --disable-everything \
          --disable-vulkan \
          --disable-hwaccels \
          --disable-vdpau \
          --enable-avcodec \
          --enable-avformat \
          --enable-swresample \
          --enable-decoder=aac,mp3,flac,wav,opus \
          --enable-encoder=aac,mp3,flac,wav,opus \
          --enable-parser=aac,mpegaudio,opus \
          --enable-demuxer=aac,mp3,flac,wav,ogg,mov \
          --enable-muxer=adts,mp3,flac,wav,ogg,mp4 \
          --enable-protocol=file,http,https,tcp,udp \
          --cc=$CC \
          --cxx=$CXX \
          --enable-neon \
          --extra-ldflags="$LDFLAGS"

        make -j4
        
        mkdir -p ../output/${{ matrix.architecture }}
        cp libavcodec/libavcodec.so ../output/${{ matrix.architecture }}/
        cp libavformat/libavformat.so ../output/${{ matrix.architecture }}/
        cp libswresample/libswresample.so ../output/${{ matrix.architecture }}/
        cp libavutil/libavutil.so ../output/${{ matrix.architecture }}/

    - name: Upload Temporary SO Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: so-libs-${{ matrix.architecture }}
        path: output/${{ matrix.architecture }}/

  build-zip-package:
    runs-on: ubuntu-latest
    needs: build-so-libs

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate Sketchware Library Structure
      run: |
        # একটি পারফেক্ট অ্যান্ড্রয়েড জিপ স্ট্রাকচার তৈরি করা
        mkdir -p ffmpeg-audio-package/jniLibs/arm64-v8a
        mkdir -p ffmpeg-audio-package/jniLibs/armeabi-v7a
        
        # মিনিমাল Manifest যোগ করা (Sketchware এর সুবিধার জন্য)
        cat << 'EOF' > ffmpeg-audio-package/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.tonmoy.ffmpeg.audio"></manifest>
        EOF

    - name: Download arm64-v8a SO
      uses: actions/download-artifact@v4
      with:
        name: so-libs-arm64-v8a
        path: ffmpeg-audio-package/jniLibs/arm64-v8a

    - name: Download armeabi-v7a SO
      uses: actions/download-artifact@v4
      with:
        name: so-libs-armeabi-v7a
        path: ffmpeg-audio-package/jniLibs/armeabi-v7a

    # কোন গ্র্যাডল ছাড়া সরাসরি লিনাক্স জিপ কমান্ড দিয়ে জিপ ফাইল তৈরি
    - name: Create Clean Zip Package
      run: |
        cd ffmpeg-audio-package
        zip -r ../ffmpeg-audio-libs.zip .

    - name: Upload Final Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-audio-libs
        path: ffmpeg-audio-libs.zip
