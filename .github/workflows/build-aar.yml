name: Build AAR

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v2
      - run: echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"
      - run: |
          mkdir -p audiolib/ffmpeg
          cd audiolib/ffmpeg
          wget -q https://github.com/writingminds/ffmpeg-android/releases/download/v0.0.2/ffmpeg-android-java.tar.gz
          tar -xzf ffmpeg-android-java.tar.gz
          rm ffmpeg-android-java.tar.gz
        continue-on-error: true
      - run: chmod +x gradlew
      - run: ./gradlew audiolib:assemble
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.1.8937393
      - uses: actions/upload-artifact@v3
        with:
          name: audiolib-aar
          path: audiolib/build/outputs/aar/
