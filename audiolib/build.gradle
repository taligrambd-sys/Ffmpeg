plugins {
    id 'com.android.library'
    id 'kotlin-android'
}

android {
    compileSdk 33
    defaultConfig {
        minSdk 21
        targetSdk 33
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++11"
            }
        }
    }
    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version "3.22.1"
        }
    }
    namespace 'com.audiolib'
}

dependencies {
    implementation 'androidx.core:core-ktx:1.9.0'
}
